<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Producto</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .contenedor{
            max-width: 700px;
            background: white;
            padding: 25px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: #333;
        }

        form{
            display: flex;
            flex-direction: column;
        }

        label{
            margin-top: 15px;
            font-weight: bold;
        }

        input, textarea, select{
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea{
            resize: vertical;
        }

        .botones{
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        button{
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-size: 16px;
        }

        .guardar{
            background-color: #28a745;
        }

        .limpiar{
            background-color: #dc3545;
        }

        button:hover{
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Ficha de Producto</h1>

        <form action="#" method="post" enctype="multipart/form-data">

            <label for="codigo">Código Alfanumérico</label>
            <input type="text" id="codigo" name="codigo"
                   placeholder="Ej: PRD-A123" required>

            <label for="nombre">Nombre del Producto</label>
            <input type="text" id="nombre" name="nombre"
                   placeholder="Ingrese nombre del producto" required>

            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion"
                      rows="4" placeholder="Descripción del producto"></textarea>

            <label for="foto">Fotografía del Producto</label>
            <input type="file" id="foto" name="foto"
                   accept="image/*">

            <label for="ficha">Ficha Técnica</label>
            <input type="file" id="ficha" name="ficha"
                   accept=".pdf,.doc,.docx">

            <label for="ubicacion">Ubicación en Bodega</label>
            <select id="ubicacion" name="ubicacion">
                <option value="">Seleccione ubicación</option>
                <option value="A1">Pasillo A - Estante 1</option>
                <option value="A2">Pasillo A - Estante 2</option>
                <option value="B1">Pasillo B - Estante 1</option>
                <option value="B2">Pasillo B - Estante 2</option>
            </select>

            <label for="stock">Cantidad en Stock</label>
            <input type="number" id="stock" name="stock"
                   min="0" placeholder="Ingrese cantidad">

            <div class="botones">
                <button type="submit" class="guardar">Guardar</button>
                <button type="reset" class="limpiar">Limpiar</button>
            </div>

        </form>
    </div>

</body>
</html>
