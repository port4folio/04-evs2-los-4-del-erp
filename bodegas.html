<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Bodegas</title>
</head>
<body>

  <div>
    <h1>Control de Bodegas</h1>

    <table>
      <thead>
        <tr>
          <th>Bodega</th>
          <th>Producto / Ítem</th>
          <th>Stock actual</th>
          <th>Entradas acumuladas</th>
          <th>Salidas acumuladas</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>

        <tr>
          <td>Bodega Norte</td>
          <td>Cemento 42.5 kg</td>
          <td>120</td>
          <td>200</td>
          <td>80</td>
          <td>
            <button>Entrada</button>
            <button>Salida</button>
          </td>
        </tr>
      </tbody>
    </table>

  </div>
</body>
</html>
